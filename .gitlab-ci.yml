# .gitlab-ci.yml

stages:
  - build

build_job:
  # Use a standard Ubuntu image
  image: ubuntu:22.04
  stage: build
  
  # This installs the tools needed to build your specific project
  before_script:
    - apt-get update && apt-get install -y build-essential cmake dpkg-dev
    
  script:
    - mkdir -p build
    - cd build
    - cmake ..
    - make
    - make package
    
  # This saves the .deb file so you can download it from the GitLab UI
  artifacts:
    paths:
      - build/*.deb
    expire_in: 1 week