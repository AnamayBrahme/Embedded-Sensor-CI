# .gitlab-ci.yml

# We use a Docker-in-Docker approach or a standard image
image: ubuntu:22.04

stages:
  - build

build_package:
  stage: build
  before_script:
    - apt-get update && apt-get install -y build-essential cmake dpkg-dev
  script:
    - mkdir build && cd build
    - cmake ..
    - make package
  artifacts:
    paths:
      - build/*.deb
    expire_in: 1 week